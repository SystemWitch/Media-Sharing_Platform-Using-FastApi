{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white shadow rounded-lg px-8 py-10">
    <h2 class="text-2xl font-bold text-center mb-8">Sign In</h2>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" id="username" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary">
      </div>
      <button type="submit" class="w-full bg-primary text-white py-3 rounded-md font-medium hover:bg-blue-700 transition">
        Login
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/login.js"></script>
{% endblock %}
